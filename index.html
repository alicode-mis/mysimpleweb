<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter Project</title>
    <!-- Links your external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HTML Section: Defines the structural elements of the page -->
    <div class="counter-container">
        <h1>Interactive Counter</h1>
        <div id="counter-value">0</div>
        <button class="decrease" id="decrease-btn">Decrease</button>
        <button id="increase-btn">Increase</button>
        <button class="addTwo" id="addTwo-btn">Add Two</button>
   
    </div>

    <!-- Links your external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
